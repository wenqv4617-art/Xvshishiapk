name: Generate Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 核心升级：通过锁定并持久化缓存 ~/.android 密钥目录，确保后续编译的所有 APK 共享同一个数字证书，完美自愈签名冲突
      - name: Cache Android Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: ${{ runner.os }}-android-keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5 # 自动在云端加载 Gradle 8.5，免去本地 wrapper.jar 二进制文件的依赖

      - name: Build APK with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StoryPhone-Android-APK
          path: app/build/outputs/apk/debug/app-debug.apk
